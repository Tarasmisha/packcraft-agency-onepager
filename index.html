<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PackCraft for Agencies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @page { size: A4 portrait; margin: 15mm; }
      @media print {
        body { background: white !important; font-size: 10pt; }
        .no-print { display: none; }
        .section-card { break-inside: avoid; border: 1px solid #e2e8f0 !important; margin-bottom: 1rem; box-shadow: none !important; }
        .mx-auto { max-width: 100% !important; padding: 0 !important; }
      }
      .section-card { page-break-inside: avoid; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <main class="mx-auto max-w-4xl px-6 py-12">
      <header class="mb-12 border-b border-slate-200 pb-10">
        <div class="flex justify-between items-start">
          <div class="space-y-4">
            <h1 id="page-title" class="text-4xl font-black tracking-tight text-slate-950 sm:text-5xl leading-tight"></h1>
            <p id="page-subtitle" class="max-w-2xl text-xl leading-relaxed text-slate-600"></p>
          </div>
          <div class="hidden sm:block">
            <span class="rounded-full bg-slate-900 px-3 py-1 text-[10px] font-bold uppercase tracking-widest text-white">Agency Edition</span>
          </div>
        </div>
      </header>

      <div id="content-grid" class="space-y-6"></div>

      <footer class="mt-20 border-t border-slate-200 pt-8 text-center no-print">
        <div id="footer-links" class="flex flex-wrap justify-center gap-x-8 gap-y-2 text-sm font-medium text-slate-500"></div>
      </footer>
    </main>

    <script type="application/json" id="marketing-content">
      {
        "markdown": "## hero\n### Headline\nTurn content retainers into 60–73% gross margin.\n### Subheadline\nPackCraft is a white-label production system for agencies. One topic in. A production pack out for your SMM, designer, videographer, and manager.\n\n## The Problem\nMargins are too thin. Production depends on unstable freelancers. Teams need constant coordination. Agencies want AI efficiency without losing client trust.\n\n## Why PackCraft?\n### Not just prompts\nA project with prompts produces raw text. PackCraft provides a delivery system with role-based instructions, brand memory, and repeatable structure.\n\n## Deliverables\n### Platform Copy\nCaptions, hooks, hashtags, and adaptation.\n### Visual Assets\nSlide-by-slide briefs for designers and scene-by-scene scripts for video.\n### Execution\nChecklists for managers and review gates for quality control.\n\n## The Economics\n### Typical Agency\n20–30% gross margin. High production costs ($1,500+ per client).\n### With PackCraft\n60–73% gross margin. Fixed production cost of $800/client/month.\n\n## Free Pilot\n### Pick one client\nWe build 3–5 real packs for your team to review. No risk, no change to your current workflow until you see the results.\n\n## Contact\nEmail: iamtaras@gmail.com | WhatsApp: +48 510 725 488"
      }
    </script>

    <script>
      const payload = JSON.parse(document.getElementById('marketing-content').textContent);
      const raw = payload.markdown;

      const parseSections = (text) => {
        return text.split(/## /).filter(Boolean).map(s => {
          const lines = s.split('\n').filter(Boolean);
          const title = lines[0].trim();
          const body = lines.slice(1).join('\n').trim();
          return { title, body };
        });
      };

      const sections = parseSections(raw);
      const container = document.getElementById('content-grid');

      sections.forEach(s => {
        const titleNorm = s.title.toLowerCase();

        // Handle Hero
        if (titleNorm === 'hero') {
          const headline = s.body.match(/### Headline\s*\n([\s\S]*?)(?=\n###|$)/i)?.[1] || '';
          const subheadline = s.body.match(/### Subheadline\s*\n([\s\S]*?)(?=\n###|$)/i)?.[1] || '';
          document.getElementById('page-title').innerText = headline.trim();
          document.getElementById('page-subtitle').innerText = subheadline.trim();
          return;
        }

        // Handle Footer/Contact
        if (titleNorm === 'contact') {
          const links = s.body.split('|').map(l => {
            const span = document.createElement('span');
            span.textContent = l.trim();
            return span;
          });
          links.forEach(l => document.getElementById('footer-links').appendChild(l));
          return;
        }

        // Create Section Card
        const card = document.createElement('section');
        card.className = 'section-card rounded-2xl p-8 border transition-all';
        
        const isEco = titleNorm.includes('economics');
        card.className += isEco 
          ? ' bg-slate-900 border-slate-900 text-white shadow-xl' 
          : ' bg-white border-slate-100 text-slate-900 shadow-sm';

        const h2 = document.createElement('h2');
        h2.className = 'text-xl font-bold tracking-tight mb-4';
        h2.textContent = s.title;
        card.appendChild(h2);

        const content = document.createElement('div');
        content.className = 'space-y-4 leading-relaxed opacity-90';

        // Split body by subheadings or paragraphs
        const parts = s.body.split(/### /).filter(Boolean);
        parts.forEach(p => {
          const pLines = p.split('\n').filter(Boolean);
          if (pLines.length > 1 || p.includes('\n')) {
            const subTitle = pLines[0].trim();
            const subBody = pLines.slice(1).join(' ');
            
            const div = document.createElement('div');
            div.innerHTML = `<h3 class="font-bold text-sm uppercase tracking-wider mb-1 ${isEco ? 'text-slate-400' : 'text-slate-500'}">${subTitle}</h3><p>${subBody}</p>`;
            content.appendChild(div);
          } else {
            const para = document.createElement('p');
            para.textContent = p.trim();
            content.appendChild(para);
          }
        });

        card.appendChild(content);
        container.appendChild(card);
      });
    </script>
  </body>
</html>
